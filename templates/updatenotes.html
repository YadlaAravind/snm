
{% extends 'dashboard.html' %}
    {% block title %}<title>update Notes</title>{% endblock %}

    {% block addcss %}<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">{% endblock %}
{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-7">

            <div class="note-card">

                <div class="card-header-custom">
                    <h2>Update Note</h2>
                </div>

                <div class="card-body p-4">

                    <form method="POST" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">Title</label>

                            <input
                                type="text"
                                class="form-control"
                                name="title"
                               value="{{notesdata[1]}}"
                                required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description</label>

                            <textarea
                                class="form-control"
                                rows="6"
                                name="description"
                                >{{notesdata[2]}}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                                Back
                            </a>

                            <button class="btn btn-primary">
                                updatenotes
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
