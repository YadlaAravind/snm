<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>OTP Verification</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	</head>
	<body class="bg-light">
		<div class="container py-5">
			<div class="row justify-content-center">
				<div class="col-md-6">
					<div class="card shadow-sm">
						<div class="card-body">
							<h4 class="card-title mb-3">OTP Verification</h4>
                             {% with messages = get_flashed_messages() %}
                            {% if messages %}
                          {% for message in messages %}
                          <center style="color:aqua;">{{message}}</center>
                        
                           {% endfor %} 
                           {% endif %}
                         {% endwith %}

							
							<form method="post">
								<div class="mb-3">
									
									<input type="text" class="form-control" id="otp" name="otp" maxlength="10" required autocomplete="one-time-code">
								</div>
								<div class="d-flex justify-content-between align-items-center">
									<a href="{{ url_for('register') }}" class="small">Back to register</a>
									<button type="submit" class="btn btn-primary">Verify</button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
