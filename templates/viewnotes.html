{% extends 'dashboard.html' %}
   {% block title %} <title>view Notes</title>{% endblock %}

   {% block addcss %} <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">{% endblock %}

{% block content %}
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-7">

            <div class="note-card">

                <div class="card-header-custom">
                    <h2>view Note</h2>
                </div>

                <div class="card-body p-4">

                   

                        <div class="mb-3">
                            <label class="form-label">Title</label>

                            <input
                                type="text"
                                class="form-control"
                                name="title"
                                value="{{notes_data[1]}}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description</label>

                            <textarea
                                class="form-control"
                                rows="6"
                                name="description"
                               >{{notes_data[2]}}</textarea>
                        </div>
                         {{notes_data[3]}}
                        <div class="d-flex justify-content-between">

                            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                                Back
                            </a>

                           

                        </div>

                    

                </div>

            </div>

        </div>

    </div>

</div>


{% endblock %}
